# Reusable workflow – deploy via SFTP med credentials fra GitHub Environment secrets.
# Samme ref/branch/tag-logikk som deploy-admin-ftp-github-secrets.yml.
#
# Hvilke miljøer som deployes (prioritet):
# 1) Input environments / secret DEPLOY_ENVIRONMENTS
# 2) Deploy-Admin API + ref/ref_type (anbefalt)
# 3) GitHub API – alle repo environments (legacy)

name: Deploy via Deploy-Admin SFTP (GitHub secrets)

on:
  workflow_call:
    inputs:
      environments:
        description: 'JSON-array med environment-navn (f.eks. ["hjellum","jaktfeltcup"]). Ved å fylle ut brukes IKKE Deploy-Admin API.'
        required: false
        default: ''
        type: string

      api_base:
        description: Deploy-Admin API base URL (kun når environments ikke er satt)
        required: false
        default: 'https://hjellum.net/deploy-admin/api'
        type: string

      ref:
        description: Git ref (branch or tag) to deploy
        required: false
        default: main
        type: string

      ref_type:
        description: 'branch eller tag (send github.ref_type fra caller)'
        required: false
        default: ''
        type: string

      manifest_path:
        description: Path to deploy manifest
        required: false
        default: deploy-manifest.json
        type: string

      submodule_path:
        description: Path to auth-module submodule folder (optional)
        required: false
        default: auth-module
        type: string

      checkout_submodules:
        description: Whether to init/update submodules
        required: false
        default: true
        type: boolean

      composer_install:
        description: Whether to run composer install
        required: false
        default: true
        type: boolean

      composer_ci_file:
        description: 'Use this file as composer.json in CI (e.g. composer.ci.json with vcs repos). If set, runs composer update instead of install.'
        required: false
        default: ''
        type: string

      artifact_suffix:
        description: 'Suffix for artifact name (e.g. namdal, test). Må være unikt når flere jobber kaller workflow i samme run.'
        required: false
        default: default
        type: string

    secrets:
      DEPLOY_ADMIN_APP_KEY:
        required: false
        description: Application key for Deploy-Admin API (to fetch target list)
      DEPLOY_ADMIN_ADMIN_KEY:
        required: false
        description: Admin key for Deploy-Admin API (to fetch target list)
      PAT_TOKEN:
        required: false
        description: Personal Access Token for private repos/submodules
      CALLER_GITHUB_TOKEN:
        required: false
        description: Caller repo token (e.g. secrets.GITHUB_TOKEN) for looking up environments via GitHub API
      DEPLOY_ENVIRONMENTS:
        required: false
        description: 'Secret med JSON-array av environment-navn (f.eks. ["hjellum","jaktfeltcup"])'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.matrix }}
      skip_deploy: ${{ steps.targets.outputs.skip_deploy }}
      ftpExclude: ${{ steps.manifest.outputs.ftpExclude }}
      remoteProtect: ${{ steps.manifest.outputs.remoteProtect }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          submodules: false
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Checkout submodules
        if: ${{ inputs.checkout_submodules }}
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          SUBMODULE_PATH: ${{ inputs.submodule_path }}
        run: |
          set -euo pipefail
          if [ ! -f .gitmodules ] || [ ! -s .gitmodules ]; then exit 0; fi
          if [ -n "${PAT_TOKEN:-}" ]; then
            git config --global url."https://${PAT_TOKEN}@github.com/".insteadOf "https://github.com/"
            git config --global credential.helper store
            echo "https://${PAT_TOKEN}@github.com" > ~/.git-credentials
            chmod 600 ~/.git-credentials
          fi
          git submodule sync --recursive 2>&1 | grep -v "No url found" || true
          git submodule update --init --recursive --depth 1 2>&1 || true

      - name: Install Composer dependencies
        if: ${{ inputs.composer_install }}
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          COMPOSER_CI_FILE: ${{ inputs.composer_ci_file }}
        run: |
          set -euo pipefail
          if [ ! -f "composer.json" ]; then exit 0; fi
          command -v composer >/dev/null || (php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');" && php composer-setup.php --install-dir=/usr/local/bin --filename=composer && php -r "unlink('composer-setup.php');")
          if [ -n "${PAT_TOKEN:-}" ]; then
            composer config --global github-oauth.github.com "$PAT_TOKEN"
            composer config --global github-protocols https
            git config --global url."https://x-access-token:${PAT_TOKEN}@github.com/".insteadOf "git@github.com:"
          fi
          if [ -n "${COMPOSER_CI_FILE:-}" ] && [ -f "$COMPOSER_CI_FILE" ]; then
            cp "$COMPOSER_CI_FILE" composer.json
            composer update --no-dev --optimize-autoloader --no-interaction
          else
            composer install --no-dev --optimize-autoloader --no-interaction
          fi

      - name: Determine deploy targets
        id: targets
        env:
          ENVIRONMENTS_JSON: ${{ inputs.environments }}
          DEPLOY_ENVIRONMENTS: ${{ secrets.DEPLOY_ENVIRONMENTS }}
          CALLER_GITHUB_TOKEN: ${{ secrets.CALLER_GITHUB_TOKEN }}
          API_BASE: ${{ inputs.api_base }}
          APP_KEY: ${{ secrets.DEPLOY_ADMIN_APP_KEY }}
          ADMIN_KEY: ${{ secrets.DEPLOY_ADMIN_ADMIN_KEY }}
          REF: ${{ inputs.ref }}
          REF_TYPE: ${{ inputs.ref_type }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          command -v jq >/dev/null || (sudo apt-get update -qq && sudo apt-get install -y jq)
          ENVS="${ENVIRONMENTS_JSON:-${DEPLOY_ENVIRONMENTS:-}}"
          if [ -n "$ENVS" ]; then
            MATRIX_JSON=$(echo "$ENVS" | jq -c 'if type == "array" then [.[] | if type == "string" then {environment: .} else . end] | {include: .} else error("environments må være JSON-array") end')
            echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Using environments from input/secret"
          elif [ -n "${APP_KEY:-}" ] || [ -n "${ADMIN_KEY:-}" ]; then
            if [ -n "${APP_KEY:-}" ]; then AUTH_PARAM="app_key=${APP_KEY}"; else AUTH_PARAM="admin_key=${ADMIN_KEY}"; fi
            REF_TYPE_PARAM=""
            if [ -n "${REF_TYPE:-}" ]; then REF_TYPE_PARAM="&ref_type=${REF_TYPE}"; fi
            URL="${API_BASE}/deploy-targets.php?repo=${REPO}&ref=${REF}&credentials=github&${AUTH_PARAM}${REF_TYPE_PARAM}"
            RESPONSE=$(curl -sS --max-time 30 "$URL") || true
            SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
            if [ "$SUCCESS" != "true" ]; then
              MSG=$(echo "$RESPONSE" | jq -r '.message // "Deploy-Admin API error"')
              echo "::error::${MSG}"
              exit 1
            fi
            DEPLOYMENTS=$(echo "$RESPONSE" | jq -c '.data.deployments')
            COUNT=$(echo "$DEPLOYMENTS" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
              echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
              echo "Ingen deploy-targets for ref=${REF} ref_type=${REF_TYPE:-auto} – hopper over deploy"
              exit 0
            fi
            MATRIX_JSON=$(echo "$DEPLOYMENTS" | jq -c '[.[] | {environment: .environment}] | {include: .}')
            echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Using ${COUNT} environment(s) from Deploy-Admin for ref=${REF}"
          elif [ -n "${CALLER_GITHUB_TOKEN:-}" ]; then
            echo "::warning::Deployer til ALLE GitHub environments uten ref-filter. Bruk DEPLOY_ADMIN_APP_KEY for branch/tag-regler."
            RESPONSE=$(curl -sS -H "Authorization: Bearer ${CALLER_GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${REPO}/environments?per_page=100") || true
            NAMES=$(echo "$RESPONSE" | jq -r '.environments[]?.name // empty' 2>/dev/null)
            if [ -z "$NAMES" ]; then
              echo "::error::GitHub API returnerte ingen environments for $REPO."
              exit 78
            fi
            MATRIX_JSON=$(echo "$NAMES" | jq -R -s -c 'split("\n") | map(select(length > 0)) | [.[] | {environment: .}] | {include: .}')
            echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Using environments from GitHub API ($(echo "$NAMES" | wc -l) environments)"
          else
            echo "::error::Sett DEPLOY_ADMIN_APP_KEY (anbefalt), environments/DEPLOY_ENVIRONMENTS, eller CALLER_GITHUB_TOKEN"
            exit 1
          fi

      - name: Prepare manifest and create deployment package
        id: manifest
        env:
          MANIFEST: ${{ inputs.manifest_path }}
        run: |
          set -euo pipefail
          rm -rf deploy-package && mkdir -p deploy-package
          if [ -f "$MANIFEST" ]; then
            EXCLUDE_STR=$(jq -r '.ftpExclude[]? // empty' "$MANIFEST" | paste -sd '\n' - | sed 's/\"/\\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
            echo "ftpExclude=${EXCLUDE_STR}" >> "$GITHUB_OUTPUT"
            # Stier på serveren (relativt til FTP_PATH) som rsync --delete ikke skal slette (f.eks. gammelt statisk innhold)
            PROTECT_STR=$(jq -r '.remoteProtect // [] | .[]' "$MANIFEST" | paste -sd '\n' - | sed 's/\"/\\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
            echo "remoteProtect=${PROTECT_STR}" >> "$GITHUB_OUTPUT"
            FILTER_FILE=$(mktemp)
            echo "+ */" >> "$FILTER_FILE" && echo "+ /.htaccess" >> "$FILTER_FILE"
            # Inkluder public/.htaccess (document root = public/ – ellers slettes den av --delete på server)
            echo "+ public/.htaccess" >> "$FILTER_FILE"
            # Mapper i manifest (f.eks. app/) må ha + mappe/*** — ellers matcher ikke + app/ filer under app/, og - * ekskluderer alt innhold.
            jq -r '.include[]' "$MANIFEST" | while read -r pattern; do
              echo "+ ${pattern}" >> "$FILTER_FILE"
              case "$pattern" in */) echo "+ ${pattern}***" >> "$FILTER_FILE" ;; esac
            done
            jq -r '.exclude[]? // empty' "$MANIFEST" | while read -r pattern; do echo "- ${pattern}" >> "$FILTER_FILE"; done
            echo "- *" >> "$FILTER_FILE"
            rsync -a --delete --prune-empty-dirs --filter="merge $FILTER_FILE" ./ deploy-package/
            echo "Deploy-pakke: $(du -sh deploy-package | cut -f1), filer: $(find deploy-package -type f | wc -l)"
          else
            echo "ftpExclude=" >> "$GITHUB_OUTPUT"
            echo "remoteProtect=" >> "$GITHUB_OUTPUT"
            # Inkluder vendor/ (composer install kjører i build-jobben)
            rsync -a --delete --prune-empty-dirs --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='deploy-package' ./ deploy-package/
          fi
          [ -f ".htaccess" ] && cp .htaccess deploy-package/.htaccess && cp .htaccess deploy-package/htaccess-backup.txt
          # public/.htaccess: med i public/ (når FTP_PATH = prosjektrot) og som pakkerot (når FTP_PATH = document root = public/)
          mkdir -p deploy-package/public
          if [ -f "public/.htaccess" ]; then
            cp public/.htaccess deploy-package/public/.htaccess
            cp public/.htaccess deploy-package/.htaccess
            cp public/.htaccess deploy-package/public-htaccess-backup.txt
          fi
          echo "✓ Deployment package created"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package-${{ inputs.artifact_suffix }}
          path: deploy-package/

  deploy:
    needs: build
    if: ${{ needs.build.outputs.skip_deploy != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build.outputs.targets) }}

    environment: ${{ matrix.environment }}

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: deploy-package-${{ inputs.artifact_suffix }}
          path: deploy-package/

      - name: Restore .htaccess (if missing)
        run: |
          if [ ! -f "deploy-package/.htaccess" ] && [ -f "deploy-package/htaccess-backup.txt" ]; then
            mv deploy-package/htaccess-backup.txt deploy-package/.htaccess
          fi
          if [ ! -f "deploy-package/public/.htaccess" ] && [ -f "deploy-package/public-htaccess-backup.txt" ]; then
            mkdir -p deploy-package/public
            cp deploy-package/public-htaccess-backup.txt deploy-package/public/.htaccess
          fi

      - name: Log deploy target (environment and SFTP host status, host not revealed)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          echo "Deploy environment: ${{ matrix.environment }}"
          if [ -n "${FTP_HOST:-}" ]; then
            echo "FTP_HOST (SFTP server): set (length ${#FTP_HOST} chars)"
          else
            echo "::error::Mangler SFTP-server (vertsnavn eller IP): sett GitHub-secret med navn FTP_HOST for miljø '${{ matrix.environment }}'. Det er serveradressen, ikke brukernavn eller passord."
            exit 1
          fi

      - name: Build rsync exclude args from manifest
        id: rsync_exclude
        env:
          FTP_EXCLUDE: ${{ needs.build.outputs.ftpExclude }}
        run: |
          if [ -z "${FTP_EXCLUDE:-}" ]; then
            echo "args=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # ftpExclude is newline-escaped (\n); convert to --exclude=X --exclude=Y
          args=$(echo "$FTP_EXCLUDE" | sed 's/\\n/\n/g' | grep -v '^$' | sed 's/^/--exclude=/' | paste -sd ' ' -)
          echo "args=$args" >> "$GITHUB_OUTPUT"

      - name: Deploy via SFTP – sync contents of deploy-package to webroot
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          REMOTE_PATH: ${{ secrets.FTP_PATH }}
          RSYNC_EXCLUDE: ${{ steps.rsync_exclude.outputs.args }}
          REMOTE_PROTECT: ${{ needs.build.outputs.remoteProtect }}
        run: |
          set -euo pipefail
          # Ensure remote path ends with / so rsync puts contents there (not in a subfolder)
          REMOTE_DIR="${REMOTE_PATH%/}/"
          # rsync contents of deploy-package/ to remote (trailing slash = contents only).
          # --delete: fjern alt på server som ikke finnes i pakken (speil). Beskytt .env og ev. remoteProtect i manifest.
          RSYNC_PROTECT=(--filter 'P .env')
          if [ -n "${REMOTE_PROTECT:-}" ]; then
            while IFS= read -r pat; do
              [ -z "$pat" ] && continue
              RSYNC_PROTECT+=(--filter "P ${pat}")
            done <<< "$(echo "$REMOTE_PROTECT" | sed 's/\\n/\n/g')"
          fi
          sudo apt-get update -qq && sudo apt-get install -y sshpass rsync
          export RSYNC_RSH="ssh -o StrictHostKeyChecking=no -p 22"
          sshpass -p "$FTP_PASS" rsync -avz --delete "${RSYNC_PROTECT[@]}" \
            $RSYNC_EXCLUDE \
            deploy-package/ \
            "$FTP_USER@$FTP_HOST:$REMOTE_DIR"

# Deploy via Deploy-Admin og ci-templates (SFTP).
# Krav: GitHub Environment «hjellum-no-bifrostevents» med FTP_*-secrets (synket fra Deploy-Admin).
name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: Branch eller tag
        required: true
        default: main

jobs:
  deploy:
    uses: ./.github/workflows/deploy-admin-sftp-github-secrets.yml
    permissions:
      contents: read
      deployments: write
    with:
      ref: ${{ github.event.inputs.ref || github.ref_name }}
      manifest_path: deploy-manifest.json
      checkout_submodules: false
      composer_install: true
      environments: '["hjellum-no-bifrostevents"]'
      artifact_suffix: bifrostevents
    secrets: inherit
